<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TesTube</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 24px;
			}
			.player {
				width: min(100%, 960px);
				aspect-ratio: 16 / 9;
			}
			.player iframe {
				width: 100%;
				height: 100%;
				border: 0;
			}
		</style>
	</head>
	<body>
		<h1>TesTube</h1>
		<div class="player">
			<iframe
				src="https://www.youtube.com/embed/_YJDzLgaVD4"
				title="YouTube video player"
				allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
				allowfullscreen
			></iframe>
		</div>
	</body>
</html>
