<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>YouTube Search</title>
		<style>
			body {
				font-family: Arial, sans-serif;
			}
			#search-bar {
				width: 100%;
				padding: 10px;
				font-size: 16px;
			}
			#results {
				list-style-type: none;
				padding: 0;
			}
			#results li {
				padding: 10px;
				border-bottom: 1px solid #ddd;
			}
			#results li a {
				text-decoration: none;
				color: #007bff;
			}
			#results li a:hover {
				text-decoration: underline;
			}
			#player {
				margin-top: 20px;
			}
		</style>
	</head>
	<body>
		<h1>YouTube Search</h1>
		<input type="text" id="search-bar" placeholder="Search YouTube" />
		<button onclick="searchYouTube()">Search</button>
		<ul id="results"></ul>
		<div id="player"></div>

		<script>
			let player;
			function onYouTubeIframeAPIReady() {
				player = new YT.Player("player", {
					height: "390",
					width: "640",
					events: {
						onReady: onPlayerReady,
						onStateChange: onPlayerStateChange,
					},
				});
			}

			function onPlayerReady(event) {
				// The API will call this function when the video player is ready.
				event.target.playVideo();
			}

			function onPlayerStateChange(event) {
				// The API will call this function when the player's state changes.
				if (event.data == YT.PlayerState.PLAYING) {
					console.log("Video is playing");
				}
			}

			async function searchYouTube() {
				const query = document.getElementById("search-bar").value;
				console.log("Search Query:", query);

				try {
					const response = await fetch(
						`/search?q=${encodeURIComponent(query)}`,
					);
					if (!response.ok) {
						throw new Error(`HTTP error! status: ${response.status}`);
					}
					const videoLinks = await response.json();
					console.log("Fetched Video Links:", videoLinks);

					displayResults(videoLinks);
				} catch (error) {
					console.error("Error:", error);
				}
			}

			function displayResults(videoLinks) {
				const results = document.getElementById("results");
				results.innerHTML = "";
				videoLinks.forEach((video, index) => {
					const li = document.createElement("li");
					const a = document.createElement("a");
					a.href = `#`;
					a.textContent = `Video ${index + 1}`;
					a.onclick = () => {
						player.loadVideoById(video.videoId, 0, "large");
					};
					li.appendChild(a);
					results.appendChild(li);
				});
			}
		</script>
		<script src="https://www.youtube.com/iframe_api"></script>
	</body>
</html>
